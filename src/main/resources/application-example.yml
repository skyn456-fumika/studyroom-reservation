server:
  port: 8095

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/studyroom_reservation?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: your_db_username
    password: your_db_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: your-jwt-secret-key-must-be-at-least-32-bytes
# 30분(1800000)
  expiration: 1800000
# 14일(1209600000)
  refresh-expiration: 1209600000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs