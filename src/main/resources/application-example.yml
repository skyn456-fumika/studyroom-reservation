server:
  port: 8095

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/studyroom_reservation?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: your_db_username
    password: your_db_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

jwt:
  # 최소 32바이트 이상의 문자열을 사용하세요.
  secret: your-jwt-secret-key-must-be-at-least-32-bytes

  # Access Token 만료 시간: 30분
  expiration: 1800000

  # Refresh Token 만료 시간: 14일
  refresh-expiration: 1209600000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# 업로드 파일은 프로젝트 실행 위치 기준 uploads/rooms 폴더에 저장됩니다.
# 예: java -jar target/reservation-0.0.1-SNAPSHOT.jar 실행 위치/uploads/rooms